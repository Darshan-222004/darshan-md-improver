name: ' Darshan Markdown Improver'
description: 'Refines Markdown files using AI.'
inputs:
  repo:
    description: 'GitHub repository URL'
    required: true
  mdfile:
    description: 'Markdown file to refine'
    required: true
  purpose:
    description: 'Purpose of the refinement'
    required: true

runs:
  using: 'docker'
  image: 'docker://python:3.8'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Clone repository
      run: |
        git clone ${{ inputs.repo }} repo
      shell: bash  # <-- Add shell property here (bash is a common choice)

    - name: Copy Python script
      run: |
        cp ${{ github.action_path }}/md_auto_refine.py repo/
      shell: bash  # <-- Add shell property here

    - name: Run Python script
      run: |
        python repo/md_auto_refine.py ${{ inputs.mdfile }} ${{ inputs.purpose }}
      shell: bash  # <-- Add shell property here
