name: "Markdown Refiner Action"
description: "Improves markdown files in a given repo using OpenAI"
author: "Darshan Bharadwaj"

inputs:
  repo:
    description: 'The GitHub repository URL'
    required: true
  mdfile:
    description: 'The markdown file to refine'
    required: true
  purpose:
    description: 'The purpose of the refinement'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout target repo
      run: |
        git clone ${{ inputs.repo }} repo
        cd repo
      shell: bash

    - name: Refine markdown
      run: |
        pip install openai
        python ../md_auto_refine.py "${{ inputs.repo }}" "${{ inputs.mdfile }}" "${{ inputs.purpose }}"
      shell: bash
