name: "Darshan Markdown Improver"
description: "Improves a markdown file using OpenAI API"
inputs:
  repo:
    description: "GitHub repository URL"
    required: true
  mdfile:
    description: "Markdown file path inside the repo"
    required: true
  purpose:
    description: "Purpose of improvement"
    required: true
runs:
  using: "composite"
  steps:
    - run: echo "Cloning the repo..."
      shell: bash
    - run: git clone ${{ inputs.repo }} repo
      shell: bash

    - run: echo "Installing OpenAI Python package..."
      shell: bash
    - run: pip install openai
      shell: bash

    - run: echo "Copying Python script to the cloned repo folder..."
      shell: bash
    - run: cp ${{ github.action_path }}/md_auto_refine.py repo/
      shell: bash

    - run: echo "Running the script..."
      shell: bash
    - run: python repo/md_auto_refine.py ${{ inputs.mdfile }} ${{ inputs.purpose }}
      shell: bash
