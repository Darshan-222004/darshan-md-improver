name: "Darshan Markdown Improver"
description: "Refines a markdown file in a given repo using OpenAI"
inputs:
  repo:
    description: "GitHub repo to clone"
    required: true
  mdfile:
    description: "Markdown file to refine"
    required: true
  purpose:
    description: "Purpose of refinement"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout the action repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install openai python-dotenv gitpython

    - name: Run refinement
      run: |
        python md_auto_refine.py "${{ inputs.repo }}" "${{ inputs.mdfile }}" "${{ inputs.purpose }}"
