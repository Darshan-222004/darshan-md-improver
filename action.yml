name: "Darshan MD Improver"
description: "A GitHub Action to improve markdown files using OpenAI."

inputs:
  repo:
    description: 'Repository URL'
    required: true
  mdfile:
    description: 'Markdown file to improve'
    required: true
  purpose:
    description: 'Purpose for improving markdown'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        repository: ${{ inputs.repo }}
        ref: "main"  # or whichever branch you're working on
    
    - name: Run markdown improvement
      run: |
        python3 improve_md.py --repo ${{ inputs.repo }} --file ${{ inputs.mdfile }} --purpose ${{ inputs.purpose }}
      shell: bash  # Specify the shell here (bash is the most common)
